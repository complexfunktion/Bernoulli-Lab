<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bernoulli Lab</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;text-align:center}
button{margin:5px;padding:10px}
.slider{width:40px}
.box{margin:15px;padding:10px;border:1px solid #555}
</style>
</head>
<body>

<h1>Bernoulli Lab</h1>
<div id="app"></div>

<script>
let mode="menu";
let selectedGame=null;
let settings={music:false};

let challenge={
  games:[],
  index:0,
  total:0,
  active:false
};

function randChoice(arr){return arr[Math.floor(Math.random()*arr.length)];}
function bern(p){return Math.random()<p?1:0;}

function newGames(){
  return {
    hunter:{p:Math.random(),trials:[],done:false,guess:0.5,score:0},
    streak:{p:0.1+Math.random()*0.8,streak:0,done:false,score:0},
    estimate:{p:Math.random(),turn:0,score:0,done:false},
    binary:{p:Math.floor(Math.random()*128)/128,trials:[],bits:[0,0,0,0,0,0,0],done:false,score:0},
    magyar:{p:randChoice([0.2,0.5,0.8]),round:0,matches:0,first:[],guess:null,done:false,score:0}
  };
}
let games=newGames();

function render(){
  let html="";

  if(mode==="menu"){
    html+=`<button onclick="startChallenge()">3連続チャレンジ</button>`;
    html+=`<button onclick="mode='free';render()">フリープレイ</button>`;
    html+=`<button onclick="mode='settings';render()">設定</button>`;
  }

  if(mode==="settings"){
    html+=`<p>音楽: ${settings.music?"ON":"OFF"}</p>`;
    html+=`<button onclick="settings.music=!settings.music;render()">切替</button>`;
    html+=`<button onclick="mode='menu';render()">戻る</button>`;
  }

  if(mode==="free"){
    ["hunter","streak","estimate","binary","magyar"].forEach(g=>{
      html+=`<button onclick="selectedGame='${g}';render()">${g}</button>`;
    });
    html+=`<button onclick="mode='menu';render()">戻る</button>`;
    if(selectedGame) html+=gameView(selectedGame);
  }

  if(mode==="challenge"){
    html+=`<p>${challenge.index+1}/3</p>`;
    html+=gameView(challenge.games[challenge.index]);
    html+=`<p>合計:${challenge.total}</p>`;
  }

  document.getElementById("app").innerHTML=html;
}

function startChallenge(){
  games=newGames();
  challenge.games=["hunter","streak","estimate","binary","magyar"]
    .sort(()=>Math.random()-0.5).slice(0,3);
  challenge.index=0;
  challenge.total=0;
  mode="challenge";
  render();
}

function finish(game,score){
  if(mode==="challenge"){
    challenge.total+=score;
    challenge.index++;
    if(challenge.index>=3){
      alert("終了 合計:"+challenge.total);
      mode="menu";
    }
  }
  render();
}

function gameView(g){
  if(g==="hunter")return hunterView();
  if(g==="streak")return streakView();
  if(g==="estimate")return estimateView();
  if(g==="binary")return binaryView();
  if(g==="magyar")return magyarView();
}

/////// ①確率ハンター ///////
function hunterView(){
  let g=games.hunter;
  let h=`<div class="box">試行:${g.trials.length}<br>`;
  h+=`<button onclick="g=games.hunter;g.trials.push(bern(g.p));render()">試行</button>`;
  h+=`<input value="${g.guess}" onchange="games.hunter.guess=this.value">`;
  h+=`<button onclick="submitHunter()">提出</button>`;
  if(g.done)h+=`<p>得点:${g.score}</p>`;
  return h+"</div>";
}
function submitHunter(){
  let g=games.hunter;
  let pGuess=parseFloat(g.guess);
  g.score=Math.round(100-100*Math.abs(g.p-pGuess)-g.trials.length);
  g.done=true;
  finish("hunter",g.score);
}

/////// ②ストリーク ///////
function streakView(){
  let g=games.streak;
  let h=`<div class="box">streak:${g.streak}<br>`;
  h+=`p=${g.p.toFixed(2)}<br>`;
  h+=`<button onclick="runStreak()">実行</button>`;
  h+=`<button onclick="endStreak()">終了</button>`;
  if(g.done)h+=`<p>得点:${g.score}</p>`;
  return h+"</div>";
}
function runStreak(){
  let g=games.streak;
  if(bern(g.p)) g.streak++;
  else{g.score=0;g.done=true;finish("streak",0);return;}
  render();
}
function endStreak(){
  let g=games.streak;
  g.score=g.streak*g.streak;
  g.done=true;
  finish("streak",g.score);
}

/////// ③推定 ///////
function estimateView(){
  let g=games.estimate;
  let h=`<div class="box">score:${g.score}<br>`;
  h+=`p=${g.p.toFixed(2)}<br>`;
  h+=`<button onclick="cont()">続ける</button>`;
  h+=`<button onclick="stop()">やめる</button>`;
  if(g.done)h+=`<p>確定:${g.score}</p>`;
  return h+"</div>";
}
function cont(){
  let g=games.estimate;
  if(bern(g.p)) g.score+=10;
  else{g.score-=20;g.done=true;finish("estimate",g.score);return;}
  g.turn++;
  if(g.turn>=10){g.done=true;finish("estimate",g.score);}
  render();
}
function stop(){
  let g=games.estimate;
  g.done=true;
  finish("estimate",g.score);
}

/////// ④2進数 ///////
function binaryView(){
  let g=games.binary;
  let h=`<div class="box">試行:${g.trials.length}/7<br>`;
  h+=`<button onclick="trial()">試行</button><br>0.`;
  for(let i=0;i<7;i++){
    h+=`<input type="range" min="0" max="1" value="${g.bits[i]}" class="slider"
      oninput="g=games.binary;g.bits[${i}]=Number(this.value);render()">`;
    h+=g.bits[i];
  }
  h+=`<br>入力:0.${g.bits.join("")}<br>`;
  h+=`<button onclick="submitBinary()">提出</button>`;
  if(g.done)h+=`<p>得点:${g.score}</p>`;
  return h+"</div>";
}
function trial(){
  let g=games.binary;
  if(g.trials.length<7)g.trials.push(bern(g.p));
  render();
}
function submitBinary(){
  let g=games.binary;
  let obs=g.trials.filter(x=>x===1).length;
  let guess=g.bits.filter(x=>x===1).length;

  if(obs!==guess){g.score=0;}
  else{
    let pGuess=0;
    for(let i=0;i<7;i++) if(g.bits[i]) pGuess+=2**(-(i+1));
    g.score=Math.round(100-100*Math.abs(g.p-pGuess));
  }
  g.done=true;
  finish("binary",g.score);
}

/////// ⑤マジャール ///////
function magyarView(){
  let g=games.magyar;
  let h=`<div class="box">round:${g.round}/10<br>`;
  h+=`一致:${g.matches}<br>`;
  h+=`<button onclick="mag()">実行</button><br>`;
  [0.2,0.5,0.8].forEach(v=>{
    h+=`<button onclick="games.magyar.guess=${v}">${v}</button>`;
  });
  h+=`<button onclick="finalMag()">確定</button>`;
  if(g.done)h+=`<p>得点:${g.score}</p>`;
  return h+"</div>";
}
function mag(){
  let g=games.magyar;
  if(g.round>=10)return;
  let a=bern(g.p),b=bern(g.p);
  if(a===b)g.matches++;
  g.round++;
  render();
}
function finalMag(){
  let g=games.magyar;
  g.score=(g.guess===g.p)?10:0;
  g.done=true;
  finish("magyar",g.score);
}

render();
</script>

</body>
</html>
